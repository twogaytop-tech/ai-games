<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0015 0%,#1a0a2e 50%,#0d1b3e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;overflow:hidden;position:relative}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:blink var(--d) ease-in-out infinite alternate}
@keyframes blink{0%{opacity:.1}100%{opacity:1}}
.main{position:relative;z-index:10;text-align:center;padding:40px;max-width:600px;width:90%}
h1{color:#fff;font-size:2.2em;margin-bottom:16px;text-shadow:0 0 20px rgba(147,51,234,.8)}
p{color:#c4b5fd;font-size:1.1em;margin-bottom:30px}
.badge{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;padding:6px 20px;border-radius:50px;font-size:.85em;font-weight:600;display:inline-block;margin-bottom:30px;letter-spacing:1px}
.cta-btn{display:inline-block;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;padding:18px 50px;font-size:1.2em;border-radius:50px;text-decoration:none;font-weight:700;box-shadow:0 0 30px rgba(124,58,237,.5);transition:all .3s;animation:pulse 2s ease-in-out infinite}
.cta-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(219,39,119,.7)}
@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(124,58,237,.5)}50%{box-shadow:0 0 60px rgba(219,39,119,.8)}}
.bar-wrap{width:100%;max-width:400px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:20px auto 0;overflow:hidden}
.bar{height:100%;background:linear-gradient(90deg,#7c3aed,#ec4899);border-radius:3px;width:0;transition:width 1.5s linear}
.note{color:rgba(196,181,253,.4);font-size:.75em;margin-top:12px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="main">
  <div class="badge">18+ ADULTS ONLY</div>
  <h1>Welcome to AI Games</h1>
  <p>Your experience is loading...</p>
  <a class="cta-btn" href="https://safeoffers.pro/a/Wyv9u8xNhx97V">Enter Now</a>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <p class="note">Redirecting in <span id="sec">1.5</span>s...</p>
</div>
<script>
document.querySelectorAll('.star').forEach(s=>{s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()*3+1)+'px;height:'+(Math.random()*3+1)+'px;--d:'+(Math.random()*3+2)+'s;animation-delay:'+Math.random()*3+'s'});
const bar=document.getElementById('bar'),sec=document.getElementById('sec');
let t=1.5;
bar.style.width='100%';
let i=setInterval(()=>{t=(t-.1).toFixed(1);sec.textContent=t;if(t<=0){clearInterval(i);window.location.replace('https://safeoffers.pro/a/Wyv9u8xNhx97V')}},100);
</script>
</body>
</html>
