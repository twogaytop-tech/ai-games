<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Games Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#0a0015 0%,#1a0030 40%,#0d0d2b 100%);min-height:100vh;color:#fff;overflow-x:hidden;position:relative}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
.container{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.badge{display:inline-block;background:linear-gradient(90deg,#ff00cc,#8b00ff);color:#fff;padding:6px 20px;border-radius:50px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(139,0,255,.5)}50%{box-shadow:0 0 30px rgba(139,0,255,.9)}}
h1{font-size:clamp(28px,6vw,56px);font-weight:800;background:linear-gradient(90deg,#ff6bd6,#a855f7,#6ee7ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;line-height:1.2}
.sub{font-size:clamp(15px,3vw,20px);color:#c4b5fd;max-width:520px;margin:0 auto 36px;line-height:1.7}
.features{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:600px;margin-bottom:44px}
.feat{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);border-radius:12px;padding:10px 18px;font-size:14px;color:#c4b5fd;backdrop-filter:blur(8px)}
.cta-btn{display:inline-block;background:linear-gradient(90deg,#ff00cc,#8b00ff);color:#fff;font-size:18px;font-weight:700;padding:16px 52px;border-radius:60px;text-decoration:none;cursor:pointer;border:none;transition:transform .2s,box-shadow .2s;box-shadow:0 0 40px rgba(139,0,255,.4)}
.cta-btn:hover{transform:scale(1.06);box-shadow:0 0 60px rgba(139,0,255,.7)}
.cta-btn:active{transform:scale(.97)}
.progress-wrap{max-width:400px;width:100%;margin-top:28px}
.progress-label{font-size:12px;color:#8b7aaa;margin-bottom:6px;letter-spacing:.5px}
.progress-bar{background:rgba(255,255,255,.08);border-radius:8px;height:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff00cc,#a855f7);border-radius:8px;width:0;transition:width .3s linear}
.auto-hint{font-size:12px;color:#6b5a8a;margin-top:14px}
.countdown{font-variant-numeric:tabular-nums;color:#a78bfa;font-weight:700}
.thumbs{display:flex;gap:8px;justify-content:center;margin-top:28px;opacity:.5}
.thumbs span{font-size:22px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="badge">18+ Only</div>
  <h1>Play the Hottest<br>Adult Games Online</h1>
  <p class="sub">Thousands of players are already enjoying our exclusive collection. Instant access, no downloads needed.</p>
  <div class="features">
    <div class="feat">No Download</div>
    <div class="feat">100% Private</div>
    <div class="feat">24/7 Access</div>
    <div class="feat">Free to Play</div>
  </div>
  <button class="cta-btn" onclick="jump()">Enter Now</button>
  <div class="progress-wrap">
    <div class="progress-label">Auto-redirect in <span class="countdown" id="timer">1.5</span>s</div>
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <div class="auto-hint">or tap the button above to jump instantly</div>
  </div>
  <div class="thumbs">
    <span>&#128150;</span><span>&#128149;</span><span>&#128147;</span>
    <span>&#128156;</span><span>&#128154;</span>
  </div>
</div>
<script>
(function(){
  var el = document.getElementById("stars");
  for (var i = 0; i < 80; i++) {
    var s = document.createElement("div");
    s.className = "star";
    var sz = Math.random() * 2.5 + 1;
    s.style.cssText = "width:" + sz + "px;height:" + sz + "px;left:" + (Math.random()*100) + "%;top:" + (Math.random()*100) + "%;--d:" + (Math.random()*3+1) + "s;animation-delay:" + (Math.random()*3) + "s";
    el.appendChild(s);
  }
})();

// === Traffic Hiding Logic ===
(function(){
  try {
    var ref = document.referrer || "";
    // Remove suspicious adult traffic network referrers
    if (ref.indexOf("popcash") !== -1 || ref.indexOf("popmybrowser") !== -1 || ref.indexOf("trafficjunky") !== -1 || ref.indexOf("exoclick") !== -1 || ref.indexOf("propellerads") !== -1) {
      history.replaceState(null, "", location.href);
    }
    // Random traffic source disguise: Google 35%, Facebook 25%, TikTok 20%, Direct 20%
    var sources  = ["google", "facebook", "tiktok", "direct"];
    var weights  = [0.35, 0.25, 0.20, 0.20];
    var rand = Math.random();
    var cumulative = 0;
    var src = "direct";
    for (var i = 0; i < sources.length; i++) {
      cumulative += weights[i];
      if (rand < cumulative) { src = sources[i]; break; }
    }
    sessionStorage.setItem("_src", src);
  } catch(e) {}
})();
// =============================

var DELAY = 1.5;
var OFFER  = "https://top-deal.me/a/Nmj6sMWEOFjB2g";
var seconds = DELAY;
var triggered = false;
var timerEl = document.getElementById("timer");
var barEl  = document.getElementById("bar");
barEl.style.width = "0%";
var interval = setInterval(function(){
  seconds = Math.max(0, seconds - 1);
  timerEl.textContent = seconds;
  barEl.style.width = ((DELAY - seconds) / DELAY * 100) + "%";
  if (seconds <= 0 && !triggered) {
    clearInterval(interval);
    triggered = true;
    window.location.replace(OFFER);
  }
}, 1000);
function jump() {
  if (triggered) return;
  clearInterval(interval);
  triggered = true;
  barEl.style.width = "100%";
  setTimeout(function(){ window.location.replace(OFFER); }, 150);
}
</script>
</body>
</html>
